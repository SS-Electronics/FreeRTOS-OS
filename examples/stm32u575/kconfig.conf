# kconfig.conf — Demo build Kconfig preset for Nucleo-U575ZI-Q.
#
# Activate with:
#   make dev-stm32u575       (copies this file to .config automatically)
#   — or manually —
#   cp examples/stm32u575/kconfig.conf .config && make config-outputs
#
# Key U575 differences from the H723 preset
# ─────────────────────────────────────────
#   CONFIG_TARGET_MCU         → "STM32U575xx"  (U5 HAL, ARM_CM33 portable)
#   CONFIG_CPU_ARCH           → "ARM-CM33"     (Cortex-M33 + TrustZone)
#   CONFIG_HSI_VALUE          → 16000000       (U5 HSI is 16 MHz, MSI 4 MHz default)
#   CONFIG_HAL_ICACHE_…       → ICACHE peripheral on U5 (separate IP, not core)
#   CONFIG_HAL_GTZC_…         → off until TrustZone split is enabled
#   CONFIG_U5_TRUSTZONE_ENABLED → off — single-image (non-secure) build

CONFIG_TARGET_MCU="STM32U575xx"
CONFIG_CPU_ARCH="ARM-CM33"

# Clock
CONFIG_HSE_VALUE=16000000
CONFIG_HSI_VALUE=16000000
CONFIG_LSI_VALUE=32000
CONFIG_LSE_VALUE=32768
CONFIG_HSE_STARTUP_TIMEOUT=100
CONFIG_LSE_STARTUP_TIMEOUT=5000
CONFIG_EXTERNAL_CLOCK_VALUE=12288000

# Debug output
CONFIG_DEFAULT_DEBUG_EN=y
CONFIG_DRV_DEBUG_EN=y

# Core HAL modules
CONFIG_HAL_CORTEX_MODULE_ENABLED=y
CONFIG_HAL_PWR_MODULE_ENABLED=y
CONFIG_HAL_RCC_MODULE_ENABLED=y
CONFIG_HAL_GPIO_MODULE_ENABLED=y
CONFIG_HAL_EXTI_MODULE_ENABLED=y
CONFIG_HAL_FLASH_MODULE_ENABLED=y
CONFIG_HAL_DMA_MODULE_ENABLED=y
CONFIG_HAL_TIM_MODULE_ENABLED=y

# Communication peripherals
CONFIG_HAL_UART_MODULE_ENABLED=y
CONFIG_HAL_I2C_MODULE_ENABLED=y
CONFIG_HAL_SPI_MODULE_ENABLED=y

# U5-specific peripherals
CONFIG_HAL_ICACHE_MODULE_ENABLED=y
CONFIG_HAL_GTZC_MODULE_ENABLED=n
CONFIG_HAL_PKA_MODULE_ENABLED=n

# TrustZone — disabled for the single-image example; the trustcore module
# still runs device-identity + flash-integrity attestation at boot.
CONFIG_U5_TRUSTZONE_ENABLED=n

# System configuration
CONFIG_VDD_VALUE=3300
CONFIG_TICK_INT_PRIORITY=1
CONFIG_PREFETCH_ENABLE=y
CONFIG_INSTRUCTION_CACHE_ENABLE=y
CONFIG_DATA_CACHE_ENABLE=n
CONFIG_USE_FULL_ASSERT=n

# OS services
CONFIG_INC_SERVICE_UART_MGMT=y
CONFIG_INC_SERVICE_IIC_MGMT=y
CONFIG_INC_SERVICE_OS_SHELL_MGMT=y

# FreeRTOS kernel tuning
CONFIG_RTOS_TICK_RATE_HZ=1000
CONFIG_RTOS_TOTAL_HEAP_SIZE=80000
CONFIG_RTOS_MAX_PRIORITIES=56
CONFIG_RTOS_MINIMAL_STACK_SIZE=512
CONFIG_RTOS_MAX_TASK_NAME_LEN=16
CONFIG_RTOS_USE_PREEMPTION=y
CONFIG_RTOS_USE_TIME_SLICING=y
CONFIG_RTOS_USE_MUTEXES=y
CONFIG_RTOS_USE_RECURSIVE_MUTEXES=y
CONFIG_RTOS_USE_COUNTING_SEMAPHORES=y
CONFIG_RTOS_QUEUE_REGISTRY_SIZE=8
CONFIG_RTOS_USE_TIMERS=y
CONFIG_RTOS_TIMER_TASK_PRIORITY=2
CONFIG_RTOS_TIMER_QUEUE_LENGTH=10
CONFIG_RTOS_TIMER_TASK_STACK_DEPTH=256
CONFIG_RTOS_LIBRARY_LOWEST_IRQ_PRIORITY=15
CONFIG_RTOS_LIBRARY_MAX_SYSCALL_IRQ_PRIORITY=5

# IPC Buffer Sizes
CONFIG_PIPE_UART_1_DRV_RX_SIZE=512
CONFIG_PIPE_UART_1_DRV_TX_SIZE=512
CONFIG_ITM_PRINT_BUFF_LENGTH=64
