# ── OpenOCD configuration — STM32F411VET6 ────────────────────────────────────
#
# Target  : STM32F411VET6 — ARM Cortex-M4F, 100 MHz, 512 KB Flash, 128 KB RAM
# Probe   : ST-Link v2 / v2-1 (built-in on Nucleo and Discovery boards)
# Protocol: SWD (Serial Wire Debug)
#
# Used by:
#   make flash
#   VSCode launch.json (Cortex-Debug servertype: openocd)
#   scripts/run_openocd_server.sh

# ── Debug probe ───────────────────────────────────────────────────────────────
source [find interface/stlink.cfg]

# SWD is faster and more reliable than JTAG for STM32F4
transport select hla_swd

# ── Target ────────────────────────────────────────────────────────────────────
set CHIPNAME stm32f411xe

# STM32F4xx generic target script — sets up flash banks, RAM regions,
# Cortex-M4 core, and FPB (Flash Patch and Breakpoint) unit.
source [find target/stm32f4x.cfg]

# ── Reset strategy ────────────────────────────────────────────────────────────
# srst_only    — use NRST pin for reset (most reliable on F4)
# srst_nogate  — allow debug access during reset
# connect_assert_srst — hold reset while OpenOCD connects (avoids
#                       runaway code before halt)
reset_config srst_only srst_nogate connect_assert_srst

# ── Flash bank ────────────────────────────────────────────────────────────────
# STM32F411VET6: 512 KB Flash at 0x0800_0000
# Explicitly declared so 'program' and 'flash write_image' work correctly.
flash bank stm32f4x.flash stm32f4x 0x08000000 0x00080000 0 0 $_TARGETNAME

# ── SWD clock ─────────────────────────────────────────────────────────────────
# 4 MHz is reliable for most boards. Increase to 8000 if wiring is clean,
# reduce to 1000 if you see "libusb_bulk_transfer" errors.
adapter speed 4000

# ── GDB behaviour ─────────────────────────────────────────────────────────────
# Enable flash programming through GDB 'load' command
gdb_memory_map enable
gdb_flash_program enable

# Report data aborts as GDB signals rather than silently ignoring them
# (catches reads of unpowered peripheral regions)
$_TARGETNAME configure -event gdb-attach {
    echo "GDB attached — halting target"
    halt
}

# After programming, always reset to __start (not a stale PC)
$_TARGETNAME configure -event gdb-flash-erase-start {
    reset halt
}
