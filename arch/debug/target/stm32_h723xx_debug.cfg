# ── OpenOCD configuration — STM32H723ZGTx ────────────────────────────────────
#
# Target  : STM32H723ZGTx — ARM Cortex-M7, 550 MHz, 1 MB Flash, 128 KB DTCM
# Probe   : ST-Link v2 / v2-1 / v3 (built-in on Nucleo-H723ZG)
# Protocol: SWD (Serial Wire Debug)
#
# Used by:
#   make flash
#   VSCode launch.json (Cortex-Debug servertype: openocd)
#   scripts/run_openocd_server.sh

# ── Debug probe ───────────────────────────────────────────────────────────────
source [find interface/stlink.cfg]

# SWD is faster and more reliable than JTAG for STM32H7
transport select hla_swd

# ── Target ────────────────────────────────────────────────────────────────────
set CHIPNAME stm32h723zg

# STM32H7x generic target script — sets up dual flash banks, DTCM/AXI SRAM
# regions, Cortex-M7 core with D-cache/I-cache, and FPB unit.
source [find target/stm32h7x.cfg]

# ── Reset strategy ────────────────────────────────────────────────────────────
# srst_only: use NRST line for system reset (available on Nucleo ZIO connector).
# connect_assert_srst: assert SRST during initial connect so the core is
# halted before any user code runs — required when SWCLK is muxed on boot.
reset_config srst_only srst_nogate connect_assert_srst

# ── SWD clock ─────────────────────────────────────────────────────────────────
# Start conservative; raise to 4000 once connection is stable.
adapter speed 1000

# ── GDB behaviour ─────────────────────────────────────────────────────────────
gdb_memory_map enable
gdb_flash_program enable

# Report data aborts as GDB signals rather than silently ignoring them
# stm32h7x.cfg creates the target as ${CHIPNAME}.cpu0
stm32h723zg.cpu0 configure -event gdb-attach {
    echo "GDB attached — halting target"
    halt
}

# After programming, always reset to Reset_Handler (not a stale PC)
stm32h723zg.cpu0 configure -event gdb-flash-erase-start {
    reset halt
}
