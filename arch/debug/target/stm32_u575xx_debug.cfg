# ── OpenOCD configuration — STM32U575ZITxQ ───────────────────────────────────
#
# Target  : STM32U575ZITxQ — ARM Cortex-M33 + TrustZone, 160 MHz, 2 MB Flash
# Board   : NUCLEO-U575ZI-Q
# Probe   : ST-Link v3 (built-in on Nucleo-U575ZI-Q)
# Protocol: SWD (Serial Wire Debug)
#
# Used by:
#   make flash
#   VSCode launch.json (Cortex-Debug servertype: openocd)
#   scripts/run_openocd_server.sh

# ── Debug probe ───────────────────────────────────────────────────────────────
source [find interface/stlink.cfg]

transport select hla_swd

# ── Target ────────────────────────────────────────────────────────────────────
set CHIPNAME stm32u575zitxq

# STM32U5 generic target script (ships with OpenOCD 0.12+).
# Configures Cortex-M33 core, single-bank or dual-bank flash, ICACHE,
# and the TZ-aware DAP discovery.
source [find target/stm32u5x.cfg]

# ── Reset strategy ────────────────────────────────────────────────────────────
# srst_only: use NRST on the ZIO connector for system reset.
# connect_assert_srst: hold reset during connect so SWCLK pin muxing settles
# before the DAP comes up.
reset_config srst_only srst_nogate connect_assert_srst

# ── SWD clock ─────────────────────────────────────────────────────────────────
# U5 is happy at 4 MHz from cold; raise to 8 MHz once the SoC has clocked up.
adapter speed 1000

# ── GDB behaviour ─────────────────────────────────────────────────────────────
gdb_memory_map enable
gdb_flash_program enable

# stm32u5x.cfg creates the target as ${CHIPNAME}.cpu
stm32u575zitxq.cpu configure -event gdb-attach {
    echo "GDB attached — halting target"
    halt
}

stm32u575zitxq.cpu configure -event gdb-flash-erase-start {
    reset halt
}
