# static_analysis.yml
# CPPcheck + MISRA C:2012 static analysis for FreeRTOS-OS.
#
# Triggered on:
#   - Every push to main / dev branches
#   - Every pull request targeting main / dev
#
# Jobs:
#   cppcheck  — general static analysis (fails on error-severity findings)
#   misra     — MISRA C:2012 rule compliance (reports violations as annotations)
#   docs      — Doxygen build check
#
# Artefacts:
#   Reports are uploaded and retained for 30 days.

name: Static Analysis

on:
  push:
    branches: [main, staging]
    paths:
      - "**.c"
      - "**.h"
      - "scripts/run_cppcheck.sh"
      - "scripts/cppcheck_suppressions.txt"
      - ".github/workflows/static_analysis.yml"
  pull_request:
    branches: [main, staging]

concurrency:
  group: static-analysis-${{ github.ref }}
  cancel-in-progress: true

env:
  REPORTS_DIR: reports/cppcheck

jobs:
  # ── Job 1: CPPcheck General Analysis ────────────────────────────────────────
  cppcheck:
    name: CPPcheck (error + warning)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install CPPcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck python3 python3-pygments
          cppcheck --version

      - name: Generate demo board headers
        run: |
          make cppcheck-board-gen
          echo "Generated files in demo/board/:"
          ls demo/board/

      - name: Run CPPcheck (warnings and above)
        id: cppcheck_run
        run: |
          chmod +x scripts/run_cppcheck.sh
          ./scripts/run_cppcheck.sh \
            --severity=warning \
            --output-dir="${{ env.REPORTS_DIR }}" \
            --jobs=2
        # Do not use continue-on-error — let the step fail naturally so
        # outcome is 'failure' only when cppcheck genuinely exits non-zero.

      - name: Upload CPPcheck reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cppcheck-reports-${{ github.run_number }}
          path: |
            ${{ env.REPORTS_DIR }}/cppcheck_report.txt
            ${{ env.REPORTS_DIR }}/cppcheck_report.xml
          retention-days: 30

      - name: Annotate step summary
        if: always()
        run: |
          REPORT="${{ env.REPORTS_DIR }}/cppcheck_report.xml"
          ERRORS=0
          WARNINGS=0
          if [[ -f "$REPORT" ]]; then
            # Count errors and warnings from the XML (authoritative source)
            ERRORS=$(grep -c 'severity="error"'   "$REPORT" 2>/dev/null || true)
            WARNINGS=$(grep -c 'severity="warning"' "$REPORT" 2>/dev/null || true)
            ERRORS=${ERRORS:-0}
            WARNINGS=${WARNINGS:-0}
          fi
          {
            echo "## CPPcheck Results"
            echo ""
            echo "| Severity | Count |"
            echo "|---|---|"
            echo "| Errors   | \`${ERRORS}\` |"
            echo "| Warnings | \`${WARNINGS}\` |"
            echo ""
            if [[ "$ERRORS" -gt 0 ]]; then
              echo "### Errors found"
              echo '```'
              grep ': error:' "${{ env.REPORTS_DIR }}/cppcheck_report.txt" 2>/dev/null | head -30 || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Job 2: MISRA C:2012 Compliance ──────────────────────────────────────────
  misra:
    name: MISRA C:2012
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install CPPcheck + MISRA dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck python3 python3-pygments
          # Verify MISRA addon is present
          MISRA_CANDIDATES=(
            /usr/lib/x86_64-linux-gnu/cppcheck/addons/misra.py
            /usr/share/cppcheck/addons/misra.py
          )
          for f in "${MISRA_CANDIDATES[@]}"; do
            if [[ -f "$f" ]]; then echo "MISRA addon: $f"; break; fi
          done

      - name: Generate demo board headers
        run: |
          make cppcheck-board-gen
          echo "Generated files in demo/board/:"
          ls demo/board/

      - name: Run CPPcheck + MISRA C:2012
        id: misra_run
        run: |
          chmod +x scripts/run_cppcheck.sh
          ./scripts/run_cppcheck.sh \
            --misra \
            --severity=warning \
            --output-dir="${{ env.REPORTS_DIR }}" \
            --jobs=2
        continue-on-error: true  # violations are informational by default

      - name: Count MISRA violations
        id: misra_count
        if: always()
        run: |
          TOTAL=0
          ERRORS=0
          CONFIG_NOISE=0
          REPORT="${{ env.REPORTS_DIR }}/misra_report.txt"
          if [[ -f "$REPORT" ]]; then
            # Count genuine MISRA rule violations (errorId starts with "c2012-")
            # Exclude "errorId":"config" entries — these are misra.py tool-internal
            # errors for unresolvable compile-time constants, not actual rule violations.
            TOTAL=$(grep '"severity"' "$REPORT" 2>/dev/null \
                    | grep -v '"errorId": "config"' | wc -l || true)
            ERRORS=$(grep '"severity": "error"' "$REPORT" 2>/dev/null \
                     | grep -v '"errorId": "config"' | wc -l || true)
            CONFIG_NOISE=$(grep -c '"errorId": "config"' "$REPORT" 2>/dev/null || true)
            TOTAL=${TOTAL:-0}
            ERRORS=${ERRORS:-0}
            CONFIG_NOISE=${CONFIG_NOISE:-0}
          fi
          echo "total=${TOTAL}"             >> "$GITHUB_OUTPUT"
          echo "errors=${ERRORS}"           >> "$GITHUB_OUTPUT"
          echo "config_noise=${CONFIG_NOISE}" >> "$GITHUB_OUTPUT"
          echo "MISRA genuine violations: ${TOTAL}  (error-level: ${ERRORS})  (config-noise filtered: ${CONFIG_NOISE})"

      - name: Annotate job summary
        if: always()
        run: |
          TOTAL="${{ steps.misra_count.outputs.total }}"
          ERRORS="${{ steps.misra_count.outputs.errors }}"
          CONFIG_NOISE="${{ steps.misra_count.outputs.config_noise }}"
          {
            echo "## MISRA C:2012 Analysis Results"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Genuine violations  | \`${TOTAL}\` |"
            echo "| Error-level         | \`${ERRORS}\` |"
            echo "| Config noise (filtered) | \`${CONFIG_NOISE}\` |"
            echo "| Branch              | \`${{ github.ref_name }}\` |"
            echo "| Commit              | \`${{ github.sha }}\` |"
            echo ""
            echo "> \`Config noise\` = \`misra.py\` internal errors for unresolvable compile-time constants — not MISRA rule violations."
            echo "> Run \`./scripts/run_cppcheck.sh --misra\` locally to reproduce."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload MISRA reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: misra-reports-${{ github.run_number }}
          path: |
            ${{ env.REPORTS_DIR }}/misra_report.txt
            ${{ env.REPORTS_DIR }}/misra_cppcheck.xml
          retention-days: 30

      - name: Fail if MISRA error-level violations found
        # Hard-fail only on 'error' severity — style/advisory violations
        # are informational and tracked in the uploaded report.
        if: steps.misra_count.outputs.errors != '0'
        run: |
          ERRORS="${{ steps.misra_count.outputs.errors }}"
          echo "::error::${ERRORS} MISRA error-severity violation(s) found. See misra_report.txt artefact."
          exit 1

  # ── Job 3: Doxygen Docs Check ────────────────────────────────────────────────
  docs:
    name: Doxygen Build
    runs-on: ubuntu-24.04
    needs: [cppcheck]

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Doxygen + Graphviz
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y doxygen graphviz

      - name: Build Doxygen docs
        working-directory: ${{ github.workspace }}
        run: doxygen Doxyfile
        continue-on-error: true

      - name: Upload Doxygen HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: doxygen-html-${{ github.run_number }}
          path: docs/
          retention-days: 7
