# static_analysis.yml
#
# Per-target 5-stage CI pipeline for FreeRTOS-OS.
#
# For every supported devboard target (stm32f411, stm32h723) the workflow
# runs these stages in order:
#
#   1. generation   make dev-<target>-gen   →  board_config.*, irq_*_generated.*
#   2. cppcheck     scripts/run_cppcheck.sh --target=<target>
#   3. misra        scripts/run_cppcheck.sh --target=<target> --misra
#   4. build        make dev-<target>       →  build/<target>.elf
#   5. doxygen      doxygen Doxyfile        (project-wide, runs once after
#                                            all target builds succeed)
#
# Each downstream stage gates on the previous via `needs:`.  Within a
# stage both targets run in parallel (matrix), so the wall-clock budget
# is roughly 5 × (longest target stage).
#
# Triggered on every push or PR touching code, generators, board XML,
# Doxyfile, or this workflow.

name: CI Pipeline

on:
  push:
    branches: [main, staging]
    paths:
      - "**.c"
      - "**.h"
      - "**.xml"
      - "**.ld"
      - "scripts/**"
      - "examples/**"
      - "arch/**"
      - "Makefile"
      - "Doxyfile"
      - ".github/workflows/static_analysis.yml"
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REPORTS_DIR: reports/cppcheck

jobs:
  # ── Stage 1: Generation ─────────────────────────────────────────────────────
  # Re-creates board_config.{c,h}, board_device_ids.h, board_handles.h, and
  # all seven irq_*_generated.* files for the target.  Cheap (pure Python),
  # so downstream stages just rerun it rather than uploading an artefact.
  generation:
    name: "1. generation (${{ matrix.target }})"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [stm32f411, stm32h723]

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Python
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3

      - name: Generate ${{ matrix.target }} board + IRQ outputs
        run: |
          make dev-${{ matrix.target }}-gen
          echo "── Generated outputs in examples/${{ matrix.target }}/board/ ──"
          ls -la examples/${{ matrix.target }}/board/

      - name: Sanity-check expected generator outputs
        run: |
          required=(
            board_config.c
            board_config.h
            board_device_ids.h
            board_handles.h
            irq_hw_conf.h
            irq_hw_init_generated.c
            irq_hw_init_generated.h
            irq_periph_dispatch_generated.c
            irq_periph_handlers_generated.h
            irq_periph_vectors_generated.inc
            irq_table_generated.c
          )
          missing=0
          for f in "${required[@]}"; do
            if [[ ! -f "examples/${{ matrix.target }}/board/$f" ]]; then
              echo "::error::missing generated file: examples/${{ matrix.target }}/board/$f"
              missing=1
            fi
          done
          if [[ $missing -ne 0 ]]; then
            exit 1
          fi
          echo "All 11 generated files present."

  # ── Stage 2: CPPcheck (warning + above) ─────────────────────────────────────
  cppcheck:
    name: "2. cppcheck (${{ matrix.target }})"
    runs-on: ubuntu-24.04
    needs: generation
    strategy:
      fail-fast: false
      matrix:
        target: [stm32f411, stm32h723]

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install CPPcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck python3 python3-pygments
          cppcheck --version

      - name: Generate ${{ matrix.target }} board headers
        run: make dev-${{ matrix.target }}-gen

      - name: Run CPPcheck (target=${{ matrix.target }}, severity=warning)
        id: cppcheck_run
        run: |
          chmod +x scripts/run_cppcheck.sh
          ./scripts/run_cppcheck.sh \
            --target=${{ matrix.target }} \
            --severity=warning \
            --output-dir="${{ env.REPORTS_DIR }}/${{ matrix.target }}" \
            --jobs=2

      - name: Annotate step summary
        if: always()
        run: |
          REPORT="${{ env.REPORTS_DIR }}/${{ matrix.target }}/cppcheck_report.xml"
          ERRORS=0; WARNINGS=0
          if [[ -f "$REPORT" ]]; then
            ERRORS=$(grep -c 'severity="error"'   "$REPORT" 2>/dev/null || true)
            WARNINGS=$(grep -c 'severity="warning"' "$REPORT" 2>/dev/null || true)
            ERRORS=${ERRORS:-0}; WARNINGS=${WARNINGS:-0}
          fi
          {
            echo "## CPPcheck (${{ matrix.target }})"
            echo ""
            echo "| Severity | Count |"
            echo "|---|---|"
            echo "| Errors   | \`${ERRORS}\` |"
            echo "| Warnings | \`${WARNINGS}\` |"
            if [[ "$ERRORS" -gt 0 ]]; then
              echo ""
              echo "### Errors"
              echo '```'
              grep ': error:' "${{ env.REPORTS_DIR }}/${{ matrix.target }}/cppcheck_report.txt" 2>/dev/null | head -30 || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CPPcheck reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cppcheck-${{ matrix.target }}-${{ github.run_number }}
          path: |
            ${{ env.REPORTS_DIR }}/${{ matrix.target }}/cppcheck_report.txt
            ${{ env.REPORTS_DIR }}/${{ matrix.target }}/cppcheck_report.xml
          retention-days: 30

  # ── Stage 3: MISRA C:2012 ───────────────────────────────────────────────────
  misra:
    name: "3. misra (${{ matrix.target }})"
    runs-on: ubuntu-24.04
    needs: cppcheck
    strategy:
      fail-fast: false
      matrix:
        target: [stm32f411, stm32h723]

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install CPPcheck + MISRA addon
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck python3 python3-pygments
          # Verify MISRA addon is present
          for f in /usr/lib/x86_64-linux-gnu/cppcheck/addons/misra.py \
                   /usr/share/cppcheck/addons/misra.py; do
            if [[ -f "$f" ]]; then echo "MISRA addon: $f"; break; fi
          done

      - name: Generate ${{ matrix.target }} board headers
        run: make dev-${{ matrix.target }}-gen

      - name: Run MISRA C:2012 (target=${{ matrix.target }})
        id: misra_run
        run: |
          chmod +x scripts/run_cppcheck.sh
          ./scripts/run_cppcheck.sh \
            --target=${{ matrix.target }} \
            --misra \
            --severity=warning \
            --output-dir="${{ env.REPORTS_DIR }}/${{ matrix.target }}" \
            --jobs=2
        continue-on-error: true   # advisory by default; hard-fail only on
                                  # error-severity violations in the next step

      - name: Count MISRA violations
        id: misra_count
        if: always()
        run: |
          TOTAL=0; ERRORS=0; CONFIG_NOISE=0
          REPORT="${{ env.REPORTS_DIR }}/${{ matrix.target }}/misra_report.txt"
          if [[ -f "$REPORT" ]]; then
            TOTAL=$(grep '"severity"' "$REPORT" 2>/dev/null \
                    | grep -v '"errorId": "config"' | wc -l || true)
            ERRORS=$(grep '"severity": "error"' "$REPORT" 2>/dev/null \
                     | grep -v '"errorId": "config"' | wc -l || true)
            CONFIG_NOISE=$(grep -c '"errorId": "config"' "$REPORT" 2>/dev/null || true)
            TOTAL=${TOTAL:-0}; ERRORS=${ERRORS:-0}; CONFIG_NOISE=${CONFIG_NOISE:-0}
          fi
          echo "total=${TOTAL}"               >> "$GITHUB_OUTPUT"
          echo "errors=${ERRORS}"             >> "$GITHUB_OUTPUT"
          echo "config_noise=${CONFIG_NOISE}" >> "$GITHUB_OUTPUT"
          echo "MISRA(${{ matrix.target }}): genuine=${TOTAL}  errors=${ERRORS}  config-noise=${CONFIG_NOISE}"

      - name: Annotate step summary
        if: always()
        run: |
          {
            echo "## MISRA C:2012 (${{ matrix.target }})"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Genuine violations     | \`${{ steps.misra_count.outputs.total }}\` |"
            echo "| Error-level            | \`${{ steps.misra_count.outputs.errors }}\` |"
            echo "| Config-noise (filtered)| \`${{ steps.misra_count.outputs.config_noise }}\` |"
            echo ""
            echo "> Reproduce locally:"
            echo "> \`./scripts/run_cppcheck.sh --target=${{ matrix.target }} --misra\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload MISRA reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: misra-${{ matrix.target }}-${{ github.run_number }}
          path: |
            ${{ env.REPORTS_DIR }}/${{ matrix.target }}/misra_report.txt
            ${{ env.REPORTS_DIR }}/${{ matrix.target }}/misra_cppcheck.xml
          retention-days: 30

      - name: Fail if MISRA error-level violations found
        if: steps.misra_count.outputs.errors != '0'
        run: |
          echo "::error::${{ steps.misra_count.outputs.errors }} MISRA error-severity violation(s) on ${{ matrix.target }}."
          exit 1

  # ── Stage 4: Firmware Build ─────────────────────────────────────────────────
  build:
    name: "4. build (${{ matrix.target }})"
    runs-on: ubuntu-24.04
    needs: misra
    strategy:
      fail-fast: false
      matrix:
        target: [stm32f411, stm32h723]

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install ARM toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi python3
          arm-none-eabi-gcc --version

      - name: Build ${{ matrix.target }} devboard example
        run: |
          make dev-${{ matrix.target }} 2>&1
          arm-none-eabi-size build/${{ matrix.target }}.elf

      - name: Annotate footprint summary
        if: always()
        run: |
          ELF="build/${{ matrix.target }}.elf"
          if [[ -f "$ELF" ]]; then
            SIZE_LINE=$(arm-none-eabi-size "$ELF" | tail -1)
            TEXT=$(echo "$SIZE_LINE" | awk '{print $1}')
            DATA=$(echo "$SIZE_LINE" | awk '{print $2}')
            BSS=$(echo  "$SIZE_LINE" | awk '{print $3}')
            FLASH=$((TEXT + DATA))
            RAM=$((DATA + BSS))
            FLASH_KB=$(python3 -c "print(f'{${FLASH}/1024:.1f}')")
            RAM_KB=$(python3 -c "print(f'{${RAM}/1024:.1f}')")
            {
              echo "## Footprint (${{ matrix.target }})"
              echo ""
              echo "| Metric | Bytes | KB |"
              echo "|---|---|---|"
              echo "| Flash (text + data) | \`${FLASH}\` | ${FLASH_KB} |"
              echo "| RAM   (data + bss)  | \`${RAM}\`   | ${RAM_KB} |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload firmware ELF + HEX + size map
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firmware-${{ matrix.target }}-${{ github.run_number }}
          path: |
            build/${{ matrix.target }}.elf
            build/${{ matrix.target }}.elf.hex
            build/${{ matrix.target }}.elf.sym
          retention-days: 14

  # ── Stage 5: Doxygen ────────────────────────────────────────────────────────
  # Project-wide — runs once after both target builds succeed.
  docs:
    name: "5. doxygen"
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Doxygen + Graphviz
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y doxygen graphviz

      - name: Build Doxygen HTML
        working-directory: ${{ github.workspace }}
        run: doxygen Doxyfile

      - name: Upload Doxygen HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: doxygen-html-${{ github.run_number }}
          path: docs/doxygen/html/
          retention-days: 7
