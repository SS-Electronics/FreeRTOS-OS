# kconfig.conf — Demo build Kconfig preset for STM32F411 devboard.
#
# Activate with:
#   make demo              (copies this file to .config automatically)
#   — or manually —
#   cp demo/kconfig.conf .config && make config-outputs
#
# This preset enables all peripherals used by the demo application and
# selects the STM32F411xE target so the correct startup/linker files
# are picked by arch/Makefile.

CONFIG_TARGET_MCU="STM32F411xE"

# Debug output
CONFIG_DEFAULT_DEBUG_EN=y
CONFIG_DRV_DEBUG_EN=y

# HAL peripheral modules
CONFIG_HAL_UART_MODULE_ENABLED=y
CONFIG_HAL_SPI_MODULE_ENABLED=y
CONFIG_HAL_I2C_MODULE_ENABLED=y
CONFIG_HAL_GPIO_MODULE_ENABLED=y
CONFIG_HAL_DMA_MODULE_ENABLED=y
CONFIG_HAL_RCC_MODULE_ENABLED=y
CONFIG_HAL_TIM_MODULE_ENABLED=y

# OS services
CONFIG_INC_SERVICE_UART_MGMT=y
CONFIG_INC_SERVICE_IIC_MGMT=y
CONFIG_INC_SERVICE_OS_SHELL_MGMT=y
